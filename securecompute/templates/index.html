<!DOCTYPE html>
<html>
<head>
    <title>Adaptive Cyber Resilient HPC System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>🛡 Adaptive Cyber Resilient HPC System</h1>

    <div class="card">

        <h2>Enter System Behavior</h2>

        <form action="/run" method="POST" class="form-grid">

            <div class="form-group">
                <label>Failed Attempts</label>
                <input type="number" name="failed" required>
            </div>

            <div class="form-group">
                <label>Request Rate</label>
                <input type="number" name="rate" required>
            </div>

            <div class="form-group">
                <label>Unauthorized (0/1)</label>
                <input type="number" name="unauthorized" min="0" max="1" required>
            </div>

            <div class="full-width">
                <button type="submit">Run Secure HPC Pipeline</button>
            </div>

        </form>

    </div>

</body>
</html>
